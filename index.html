<!-- ========================================================================= -->
    <!-- FRONTEND RUNTIME LAYER SCRIPTS -->
    <!-- ========================================================================= -->
    <script>
      var sessionUserData = null;
      
      // PASTE YOUR LIVE WEB APP EXEC URL HERE (From Deploy -> Manage Deployments)
      var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjccnPNoStbtifYzzD6Egb3yPgiqd8zotDH5TAqkI4i-Ys0izkWsWeZKGZOBWcRV_u/exec";

      window.onload = function() {
        var cached = sessionStorage.getItem("hcps_secure_session");
        if (cached) {
          sessionUserData = JSON.parse(cached);
          initializeRoleWorkspace();
        }
      };

      function handleAuthSubmit() {
        var emailInput = document.getElementById("userEmail").value.trim();
        if(!emailInput) {
          alert("Please type your school-affiliated email address to proceed.");
          return;
        }

        var standardizedEmail = emailInput.toLowerCase();
        if(!standardizedEmail.endsWith("@harrisonburg.k12.va.us")) {
          alert("Error: Verification rejected. A valid @harrisonburg.k12.va.us account profile context is required.");
          return;
        }

        // Send cross-origin lookup request directly to the Apps Script database deployment
        fetch(`${WEB_APP_URL}?email=${encodeURIComponent(standardizedEmail)}`)
          .then(function(response) { return response.json(); })
          .then(function(response) {
            if (response.success) {
              sessionUserData = response;
              sessionStorage.setItem("hcps_secure_session", JSON.stringify(response));
              initializeRoleWorkspace();
            } else {
              alert(response.message);
            }
          })
          .catch(function(err) {
            alert("Database API routing link error: " + err.toString());
          });
      }

      function logoutSession() {
        sessionStorage.clear();
        sessionUserData = null;
        document.getElementById("appWorkspace").style.display = "none";
        document.getElementById("loginSection").style.display = "flex";
      }

      function toggleDemoModal(show) {
        document.getElementById("demoModal").style.display = show ? "flex" : "none";
      }

      function handleDemoStatusChange(val) {
        if(!val || !sessionUserData) return;
        
        fetch(`${WEB_APP_URL}?email=${encodeURIComponent(sessionUserData.email)}&status=${encodeURIComponent(val)}`)
          .then(function(res) { return res.json(); })
          .then(function(res) {
             if(res.success) {
               alert("Status variable updated successfully inside Sheet2 (Column J): " + val);
             } else {
               alert("Status sync message: " + res.error);
             }
          })
          .catch(function(err) {
             alert("Status processing transmission failure: " + err.toString());
          });
      }

      function initializeRoleWorkspace() {
        document.getElementById("loginSection").style.display = "none";
        
        var appWorkspace = document.getElementById("appWorkspace");
        appWorkspace.style.display = "flex";
        
        document.getElementById("roleLabel").innerText = sessionUserData.role + " Profile";
        document.getElementById("userNameText").innerText = sessionUserData.name + " (" + sessionUserData.email + ") ";

        var viewContainer = document.getElementById("viewContainer");
        
        if (sessionUserData.role === "Interpreter") {
          renderInterpreterDashboard(viewContainer);
        } else if (sessionUserData.role === "Admin") {
          renderAdminDashboard(viewContainer);
        } else if (sessionUserData.role === "Coordinator") {
          renderCoordinatorDashboard(viewContainer);
        } else if (sessionUserData.role === "Tech") {
          renderTechDashboard(viewContainer);
        }
      }

      // =========================================================================
      // INTERPRETER ACCESS VIEW INTERFACE
      // =========================================================================
      function renderInterpreterDashboard(container) {
        var scheduleBlockHTML = '';
        
        if (sessionUserData.hasSchedule) {
          scheduleBlockHTML = `
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Teacher Assignment</th>
                    <th>Execution Slot Time</th>
                    <th>Status Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Active Scheduled Location Assignment Reference</td>
                    <td>Operational Routing Window Active</td>
                    <td>
                      <select class="status-select" onchange="handleDemoStatusChange(this.value)">
                        <option value="">Select</option>
                        <option value="Completed">Completed</option>
                        <option value="Parent Not Present">Parent Not Present</option>
                        <option value="Cancelled">Cancelled</option>
                      </select>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>`;
        } else {
          scheduleBlockHTML = `
            <div style="background: rgba(255,255,255,0.02); border: 1px dashed var(--border-color); border-radius: 8px; padding: 2rem; text-align: center; margin-top: 1rem;">
              <p style="color: var(--text-muted); margin-bottom: 1rem;">No current active assignments are published to your profile workspace today.</p>
              <span class="demo-click-prompt" onclick="toggleDemoModal(true)">Click here to open the Interactive Assignment Schedule Simulation Template Window</span>
            </div>`;
        }

        container.innerHTML = `
          <div class="grid-layout">
            <div class="dashboard-card">
              <div class="card-title">Hours Logged This Previous Session</div>
              <div class="metric-value">${sessionUserData.prevSessionHours || '0.00'} hrs</div>
            </div>
            <div class="dashboard-card">
              <div class="card-title">Total Interpreting Hours</div>
              <div class="metric-value">${sessionUserData.totalHours || '0.00'} hrs</div>
            </div>
            <div class="dashboard-card">
              <div class="card-title">Designated Language</div>
              <div class="metric-value" style="color: var(--hcps-gold); font-size: 1.8rem;">${sessionUserData.language || 'Pending Assignment'}</div>
            </div>
          </div>
          <div class="dashboard-card" style="margin-top: 2rem;">
            <div class="card-title">Today's Assignment Schedule</div>
            ${scheduleBlockHTML}
          </div>
        `;
      }

      // =========================================================================
      // TEACHER / CLUB MANAGER ADMINISTRATIVE WORKSPACE (ALIGNED FOR SHEET2)
      // =========================================================================
      function renderAdminDashboard(container) {
        container.innerHTML = `
          <div class="grid-layout" style="grid-template-columns: 1fr 2fr;">
            <div class="dashboard-card">
              <div class="card-title">Manage Members & Create Assignment Slots</div>
              <form id="assignmentForm" onsubmit="executeAssignmentPost(event)">
                <div class="form-group">
                  <label>Select Target District Educational Facility</label>
                  <select id="assignSchool" class="input-field" style="background:#0f172a; height:45px;" required>
                    <option value="Harrisonburg High School">Harrisonburg High School</option>
                    <option value="Rocktown High School">Rocktown High School</option>
                    <option value="Skyline Middle School">Skyline Middle School</option>
                    <option value="Thomas Harrison Middle School">Thomas Harrison Middle School</option>
                    <option value="Bluestone Elementary School">Bluestone Elementary School</option>
                    <option value="Keister Elementary School">Keister Elementary School</option>
                    <option value="Smithland Elementary School">Smithland Elementary School</option>
                    <option value="Spotswood Elementary School">Spotswood Elementary School</option>
                    <option value="Stone Spring Elementary School">Stone Spring Elementary School</option>
                    <option value="Waterman Elementary School">Waterman Elementary School</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Interpreter Target School Email Lookup</label>
                  <input type="email" id="assignEmail" class="input-field" placeholder="student@harrisonburg.k12.va.us" required>
                </div>
                <div class="form-group">
                  <label>Staff Teacher Name Reference</label>
                  <input type="text" id="assignTeacher" class="input-field" placeholder="e.g. Ms. Garcia" required>
                </div>
                <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                  <div>
                    <label>Start Time</label>
                    <input type="time" id="assignStart" class="input-field" required>
                  </div>
                  <div>
                    <label>End Time</label>
                    <input type="time" id="assignEnd" class="input-field" required>
                  </div>
                </div>
                <button type="submit" class="action-btn">Commit Operational Slot Allocation</button>
              </form>
            </div>
            <div class="dashboard-card">
              <div class="card-title">Live Operational Tracking Feed (Sheet2 Live)</div>
              <div class="table-container">
                <table>
                  <thead>
                    <tr>
                      <th>Teacher/Ref</th>
                      <th>Interpreter Email</th>
                      <th>School Location</th>
                      <th>Time Frame</th>
                      <th>Live Status</th>
                    </tr>
                  </thead>
                  <tbody id="adminLiveTrackingRows">
                    <tr>
                      <td colspan="5" style="text-align:center; color:var(--text-muted);">Awaiting active sync parameters from Sheet2...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }

      function executeAssignmentPost(e) {
        e.preventDefault();
        var data = {
          school: document.getElementById("assignSchool").value,
          email: document.getElementById("assignEmail").value,
          teacher: document.getElementById("assignTeacher").value,
          startTime: document.getElementById("assignStart").value,
          endTime: document.getElementById("assignEnd").value
        };

        fetch(`${WEB_APP_URL}?action=saveAssignment&data=${encodeURIComponent(JSON.stringify(data))}`)
          .then(function(res) { return res.json(); })
          .then(function(res) {
            if(res.success) {
              alert("Assignment verified and structural metrics locked down inside Sheet2. Auto Calculated Duration: " + res.computedHours + " hours.");
              document.getElementById("assignmentForm").reset();
            } else {
              alert("System pipeline logic fault: " + res.error);
            }
          })
          .catch(function(err) {
             alert("Assignment post transmission failure: " + err.toString());
          });
      }

      // =========================================================================
      // CENTRAL OFFICE / FAMILY COORDINATOR SUITE VIEW
      // =========================================================================
      function renderCoordinatorDashboard(container) {
        container.innerHTML = `
          <div class="dashboard-card" style="margin-bottom: 2rem; border-left: 4px solid #3b82f6;">
            <div class="card-title" style="color:#3b82f6;">Coordinator Allocation Operations Dashboard</div>
            <p style="font-size:0.95rem; line-height:1.6; color:#cbd5e1;">Welcome to the Family & Community Engagement Coordinator strategic view. This portal reviews multi-facility linguistic volume tracking metrics to balance district communication demands across student translator assets.</p>
          </div>
          <div class="grid-layout">
            <div class="dashboard-card">
              <div class="card-title">Language Engagement Volume Matrix</div>
              <div class="table-container">
                <table>
                  <thead>
                    <tr><th>Linguistic Dialect Profile</th><th>Active Allocations Today</th><th>Trend Allocation State</th></tr>
                  </thead>
                  <tbody>
                    <tr><td>Spanish (Español)</td><td>14 Sessions Active</td><td style="color:#4ade80;">High Demand</td></tr>
                    <tr><td>Arabic (العربية)</td><td>4 Sessions Active</td><td style="color:#64748b;">Stable</td></tr>
                    <tr><td>Kurdish (Kurdî)</td><td>3 Sessions Active</td><td style="color:#64748b;">Stable</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div class="dashboard-card">
              <div class="card-title">District Infrastructure Coverage Metric Summary</div>
              <div style="margin-top:1rem; display:flex; flex-direction:column; gap:12px;">
                <div><span style="color:var(--text-muted); font-size:0.85rem;">High School Footprint Fill Rate</span><div style="background:#0f172a; height:8px; border-radius:4px; margin-top:4px;"><div style="background:var(--hcps-gold); width:92%; height:100%; border-radius:4px;"></div></div></div>
                <div><span style="color:var(--text-muted); font-size:0.85rem;">Middle School Footprint Fill Rate</span><div style="background:#0f172a; height:8px; border-radius:4px; margin-top:4px;"><div style="background:var(--hcps-gold); width:78%; height:100%; border-radius:4px;"></div></div></div>
                <div><span style="color:var(--text-muted); font-size:0.85rem;">Elementary Facility Coverage Footprint</span><div style="background:#0f172a; height:8px; border-radius:4px; margin-top:4px;"><div style="background:#3b82f6; width:64%; height:100%; border-radius:4px;"></div></div></div>
              </div>
            </div>
          </div>
        `;
      }

      // =========================================================================
      // SYSTEM OVERSEER TECH OPERATIONS VIEW PANELS
      // =========================================================================
      function renderTechDashboard(container) {
        container.innerHTML = `
          <div class="grid-layout">
            <div class="dashboard-card">
              <div class="card-title">System Infrastructure Status Overview</div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:1rem;">
                <div style="background:#0f172a; padding:1rem; border-radius:8px; border:1px solid var(--border-color);">
                  <div style="font-size:0.8rem; color:var(--text-muted);">Core API Endpoints</div>
                  <div style="color:#4ade80; font-weight:600; margin-top:5px; font-size:1.1rem;">Online / Secure</div>
                </div>
                <div style="background:#0f172a; padding:1rem; border-radius:8px; border:1px solid var(--border-color);">
                  <div style="font-size:0.8rem; color:var(--text-muted);">Google Script Engine Data Sync</div>
                  <div style="color:#4ade80; font-weight:600; margin-top:5px; font-size:1.1rem;">Connected (0.12ms)</div>
                </div>
              </div>
            </div>
            <div class="dashboard-card">
              <div class="card-title">Master Infrastructure Troubleshooting Triggers</div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:0.5rem;">
                <button class="action-btn" style="background:#334155; color:white; font-size:0.85rem;" onclick="appendLog('Clear Cache payload command broadcasted.')">Flush Session Cache</button>
                <button class="action-btn" style="background:#ef4444; color:white; font-size:0.85rem;" onclick="appendLog('CRITICAL EXCEPTION ROUTINE STIMULATED.')">Force Re-index Whitelist</button>
              </div>
            </div>
          </div>
          <div class="dashboard-card" style="margin-top:1.5rem;">
            <div class="card-title">Real-Time Application Pipeline Trace Logs</div>
            <div id="techLogBlock" class="diagnostic-log">
              [2026-06-26T21:12:01Z] System Core Initialization Context Verified.<br>
              [2026-06-26T21:12:05Z] Whitelisted Data Pipeline linked successfully across dynamic spreadsheet hooks.<br>
              [2026-06-26T21:12:44Z] Secure Session Authorization established token reference parameters...
            </div>
          </div>
        `;
      }

      function appendLog(msg) {
        var log = document.getElementById("techLogBlock");
        var d = new Date().toISOString();
        log.innerHTML += `<br>[${d}] ${msg}`;
        log.scrollTop = log.scrollHeight;
      }
    </script>
