<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCPS Interpreter Portal - Gateway</title>
    <style>
      :root {
        --bg-dark: #0b0f19;
        --card-bg: #1e293b;
        --border-color: #334155;
        --hcps-blue: #0284c7;
        --hcps-gold: #f59e0b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .auth-container {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        padding: 2.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .app-workspace {
        display: none;
        flex-direction: column;
        width: 100%;
        max-width: 1200px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        gap: 1.5rem;
      }

      .header-block {
        text-align: center;
      }

      .logo-subtext {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--hcps-gold);
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .main-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text-main);
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      label {
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 500;
      }

      .input-field {
        background: #0f172a;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 0.75rem 1rem;
        color: var(--text-main);
        font-size: 1rem;
        width: 100%;
        transition: border-color 0.2s;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--hcps-blue);
      }

      .action-btn {
        background: var(--hcps-gold);
        color: #000;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        padding: 0.85rem;
        font-size: 1rem;
        cursor: pointer;
        width: 100%;
        transition: opacity 0.2s;
      }

      .action-btn:hover {
        opacity: 0.9;
      }

      .error-banner {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #f87171;
        padding: 0.75rem;
        border-radius: 6px;
        font-size: 0.85rem;
        text-align: center;
        display: none;
      }

      .workspace-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1rem;
      }

      .user-badge {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .role-label {
        background: var(--hcps-blue);
        color: white;
        font-size: 0.75rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 600;
      }

      .grid-layout {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
      }

      .dashboard-card {
        background: #0f172a;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 1.5rem;
      }

      .card-title {
        font-size: 0.9rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }

      .metric-value {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--text-main);
      }

      .table-container {
        width: 100%;
        overflow-x: auto;
        margin-top: 1rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
        font-size: 0.9rem;
      }

      th {
        background: #1e293b;
        color: var(--text-muted);
        padding: 10px 12px;
        font-weight: 600;
        border-bottom: 2px solid var(--border-color);
      }

      td {
        padding: 12px;
        border-bottom: 1px solid var(--border-color);
        color: var(--text-main);
      }

      .status-select {
        background: #0f172a;
        color: var(--text-main);
        border: 1px solid var(--border-color);
        padding: 4px 8px;
        border-radius: 4px;
      }

      .diagnostic-log {
        background: #020617;
        font-family: monospace;
        padding: 1rem;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        color: #38bdf8;
        font-size: 0.85rem;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
      }

      .demo-click-prompt {
        color: var(--hcps-gold);
        text-decoration: underline;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.75);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        z-index: 999;
      }

      .modal-box {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 500px;
        position: relative;
      }
    </style>
  </head>
  <body>

    <div class="auth-container" id="loginSection">
      <div class="header-block">
        <div class="logo-subtext">Harrisonburg City Public Schools</div>
        <h1 class="main-title">Student Language Interpreter Portal</h1>
      </div>
      <div class="error-banner" id="errorMessage"></div>
      <div class="form-group">
        <label for="userEmail">District Email Address</label>
        <input type="email" id="userEmail" class="input-field" placeholder="username@harrisonburg.k12.va.us"/>
      </div>
      <button type="button" class="action-btn" onclick="handleAuthSubmit()">SIGN IN</button>
    </div>

    <div class="app-workspace" id="appWorkspace">
      <div class="workspace-header">
        <div class="user-badge">
          <span class="role-label" id="roleLabel">Awaiting Verification</span>
          <span id="userNameText" style="font-weight: 500;">Resolving Context Profile...</span>
        </div>
        <button class="action-btn" style="width:auto; padding: 0.5rem 1rem; background:#334155; color:white;" onclick="logoutSession()">Sign Out</button>
      </div>
      <div id="viewContainer"></div>
    </div>

    <div class="modal-overlay" id="demoModal">
      <div class="modal-box">
        <h3 style="margin-bottom:1rem; color:var(--hcps-gold);">Interactive Simulator</h3>
        <p style="font-size:0.9rem; color:var(--text-muted); line-height:1.5; margin-bottom:1.5rem;">
          No active assignments found. Simulate a live status update to write parameters to **Sheet2 (Column J)**.
        </p>
        <div class="form-group">
          <label>Update Live Status State</label>
          <select class="input-field" style="background:#0f172a;" onchange="handleDemoStatusChange(this.value); toggleDemoModal(false);">
            <option value="">-- Choose Option --</option>
            <option value="Completed">Completed</option>
            <option value="Parent Not Present">Parent Not Present</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
        <button class="action-btn" style="background:#334155; color:white; margin-top:1rem;" onclick="toggleDemoModal(false)">Close Window</button>
      </div>
    </div>

    <script>
      var sessionUserData = null;
      var WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjccnPNoStbtifYzzD6Egb3yPgiqd8zotDH5TAqkI4i-Ys0izkWsWeZKGZOBWcRV_u/exec";

      window.onload = function() {
        var cached = sessionStorage.getItem("hcps_secure_session");
        if (cached) {
          sessionUserData = JSON.parse(cached);
          initializeRoleWorkspace();
        }
      };

      function handleAuthSubmit() {
        var emailInput = document.getElementById("userEmail").value.trim();
        var errorMsgEl = document.getElementById("errorMessage");
        if (errorMsgEl) errorMsgEl.style.display = "none";

        if(!emailInput) {
          alert("Please type your school-affiliated email address.");
          return;
        }

        var standardizedEmail = emailInput.toLowerCase();
        if(!standardizedEmail.endsWith("@harrisonburg.k12.va.us")) {
          if (errorMsgEl) {
            errorMsgEl.innerText = "Error: Invalid domain footprint context.";
            errorMsgEl.style.display = "block";
          }
          return;
        }

        fetch(`${WEB_APP_URL}?email=${encodeURIComponent(standardizedEmail)}`)
          .then(function(res) { return res.json(); })
          .then(function(res) {
            if (res.success) {
              sessionUserData = res;
              sessionStorage.setItem("hcps_secure_session", JSON.stringify(res));
              initializeRoleWorkspace();
            } else {
              if (errorMsgEl) {
                errorMsgEl.innerText = res.message;
                errorMsgEl.style.display = "block";
              }
            }
          })
          .catch(function(err) { alert("API Connection error: " + err.toString()); });
      }

      function logoutSession() {
        sessionStorage.clear();
        sessionUserData = null;
        document.getElementById("appWorkspace").style.display = "none";
        document.getElementById("loginSection").style.display = "flex";
      }

      function toggleDemoModal(show) {
        document.getElementById("demoModal").style.display = show ? "flex" : "none";
      }

      function handleDemoStatusChange(val) {
        if(!val || !sessionUserData) return;
        fetch(`${WEB_APP_URL}?email=${encodeURIComponent(sessionUserData.email)}&status=${encodeURIComponent(val)}`)
          .then(function(res) { return res.json(); })
          .then(function(res) {
             if(res.success) alert("Database Row transaction complete: " + val);
          })
          .catch(function(err) { alert("Transmission failure: " + err.toString()); });
      }

      function initializeRoleWorkspace() {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appWorkspace").style.display = "flex";
        document.getElementById("roleLabel").innerText = sessionUserData.role;
        document.getElementById("userNameText").innerText = sessionUserData.name + " (" + sessionUserData.email + ")";

        var container = document.getElementById("viewContainer");
        if (sessionUserData.role === "Interpreter") renderInterpreterDashboard(container);
        else if (sessionUserData.role === "Admin") renderAdminDashboard(container);
        else if (sessionUserData.role === "Coordinator") renderCoordinatorDashboard(container);
        else if (sessionUserData.role === "Tech") renderTechDashboard(container);
      }

      function renderInterpreterDashboard(container) {
        var scheduleBlock = sessionUserData.hasSchedule ? `
          <div class="table-container">
            <table>
              <thead><tr><th>Teacher</th><th>Time Window</th><th>Status</th></tr></thead>
              <tbody><tr><td>Active Location Assignment</td><td>Active Runtime Window</td><td>
                <select class="status-select" onchange="handleDemoStatusChange(this.value)">
                  <option value="">Select</option><option value="Completed">Completed</option>
                  <option value="Parent Not Present">Parent Not Present</option><option value="Cancelled">Cancelled</option>
                </select>
              </td></tr></tbody>
            </table>
          </div>` : `
          <div style="background: rgba(255,255,255,0.02); border: 1px dashed var(--border-color); border-radius: 8px; padding: 2rem; text-align: center; margin-top: 1rem;">
            <p style="color: var(--text-muted); margin-bottom: 1rem;">No current assignments found for today.</p>
            <span class="demo-click-prompt" onclick="toggleDemoModal(true)">Click here to open Interactive Assignment Simulator</span>
          </div>`;

        container.innerHTML = `
          <div class="grid-layout">
            <div class="dashboard-card"><div class="card-title">Hours Logged Previous Session</div><div class="metric-value">${sessionUserData.prevSessionHours || '0.00'} hrs</div></div>
            <div class="dashboard-card"><div class="card-title">Total Interpreting Hours</div><div class="metric-value">${sessionUserData.totalHours || '0.00'} hrs</div></div>
            <div class="dashboard-card"><div class="card-title">Language Asset</div><div class="metric-value" style="color: var(--hcps-gold); font-size: 1.8rem;">${sessionUserData.language || 'Pending'}</div></div>
          </div>
          <div class="dashboard-card" style="margin-top: 2rem;"><div class="card-title">Assignments Schedule</div>${scheduleBlock}</div>`;
      }

      function renderAdminDashboard(container) {
        container.innerHTML = `
          <div class="grid-layout" style="grid-template-columns: 1fr 2fr;">
            <div class="dashboard-card">
              <div class="card-title">Create Assignment Slots</div>
              <form id="assignmentForm" onsubmit="executeAssignmentPost(event)">
                <div class="form-group">
                  <label>Educational Facility</label>
                  <select id="assignSchool" class="input-field" style="background:#0f172a; height:45px;" required>
                    <option value="Harrisonburg High School">Harrisonburg High School</option>
                    <option value="Rocktown High School">Rocktown High School</option>
                    <option value="Skyline Middle School">Skyline Middle School</option>
                    <option value="Thomas Harrison Middle School">Thomas Harrison Middle School</option>
                    <option value="Bluestone Elementary School">Bluestone Elementary School</option>
                    <option value="Keister Elementary School">Keister Elementary School</option>
                    <option value="Smithland Elementary School">Smithland Elementary School</option>
                    <option value="Spotswood Elementary School">Spotswood Elementary School</option>
                    <option value="Stone Spring Elementary School">Stone Spring Elementary School</option>
                    <option value="Waterman Elementary School">Waterman Elementary School</option>
                  </select>
                </div>
                <div class="form-group"><label>Interpreter Email Lookup</label><input type="email" id="assignEmail" class="input-field" required></div>
                <div class="form-group"><label>Teacher Reference Name</label><input type="text" id="assignTeacher" class="input-field" required></div>
                <div class="form-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                  <div><label>Start Time</label><input type="time" id="assignStart" class="input-field" required></div>
                  <div><label>End Time</label><input type="time" id="assignEnd" class="input-field" required></div>
                </div>
                <button type="submit" class="action-btn">Commit Operational Slot Allocation</button>
              </form>
            </div>
            <div class="dashboard-card">
              <div class="card-title">Live Operational Tracking Feed (Sheet2)</div>
              <div class="table-container">
                <table><thead><tr><th>Teacher</th><th>Interpreter</th><th>Location</th><th>Timeframe</th><th>Status</th></tr></thead>
                <tbody id="adminLiveTrackingRows"><tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Awaiting active sync parameters...</td></tr></tbody></table>
              </div>
            </div>
          </div>`;
      }

      function executeAssignmentPost(e) {
        e.preventDefault();
        var data = {
          school: document.getElementById("assignSchool").value,
          email: document.getElementById("assignEmail").value,
          teacher: document.getElementById("assignTeacher").value,
          startTime: document.getElementById("assignStart").value,
          endTime: document.getElementById("assignEnd").value
        };
        fetch(`${WEB_APP_URL}?action=saveAssignment&data=${encodeURIComponent(JSON.stringify(data))}`)
          .then(function(res) { return res.json(); })
          .then(function(res) {
            if(res.success) {
              alert("Assignment verified and locked down in Sheet2. Duration: " + res.computedHours + " hours.");
              document.getElementById("assignmentForm").reset();
            }
          })
          .catch(function(err) { alert("Post error: " + err.toString()); });
      }

      function renderCoordinatorDashboard(container) {
        container.innerHTML = `
          <div class="dashboard-card" style="margin-bottom: 2rem; border-left: 4px solid #3b82f6;">
            <div class="card-title" style="color:#3b82f6;">Engagement Coordinator Overview</div>
            <p style="font-size:0.95rem; color:#cbd5e1;">Reviewing multi-facility tracking metrics to balance translator loads.</p>
          </div>
          <div class="grid-layout">
            <div class="dashboard-card">
              <div class="card-title">Language Matrix Volumes</div>
              <div class="table-container">
                <table>
                  <thead><tr><th>Dialect Profile</th><th>Active Today</th><th>Trend State</th></tr></thead>
                  <tbody>
                    <tr><td>Spanish (Español)</td><td>14 Sessions</td><td style="color:#4ade80;">High Demand</td></tr>
                    <tr><td>Arabic (العربية)</td><td>4 Sessions</td><td style="color:#64748b;">Stable</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>`;
      }

      function renderTechDashboard(container) {
        container.innerHTML = `
          <div class="grid-layout">
            <div class="dashboard-card">
              <div class="card-title">Infrastructure Monitoring</div>
              <div style="color:#4ade80; font-weight:600; margin-top:10px;">Core Engines Online / Connected (0.12ms)</div>
            </div>
          </div>
          <div class="dashboard-card" style="margin-top:1.5rem;">
            <div class="card-title">Application Pipeline Trace Logs</div>
            <div id="techLogBlock" class="diagnostic-log">[2026-06-26T21:12:01Z] System Core Initialization verified...</div>
          </div>`;
      }
    </script>
  </body>
</html>
